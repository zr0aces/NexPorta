services:
  indexer:
    build: ./indexer
    container_name: nexporta-indexer
    environment:
      CONTENT_DIR: /content
      OUTPUT_FILE: /data/index.json
      DEBOUNCE_MS: "1000"
      HOST: 0.0.0.0
      PORT: 3000
      API_PASSWORD: ${API_PASSWORD}
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-30}
      ALLOWED_CORS_ORIGIN: ${ALLOWED_CORS_ORIGIN:-*}
    volumes:
      - ./homepage:/content
      - index_data:/data
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: nexporta-web
    ports:
      - "${HOST_PORT:-8199}:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - index_data:/data:ro
      - ./homepage:/content:rslave,ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - indexer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  index_data:
