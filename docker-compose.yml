services:
  indexer:
    build: ./indexer
    user: "0:0"
    environment:
      CONTENT_DIR: /content
      OUTPUT_FILE: /data/index.json
      DEBOUNCE_MS: "1000"
    volumes:
      - ./content:/content:ro
      - index_data:/data
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - index_data:/data:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./content:/content:rslave,ro
    depends_on:
      - indexer
    restart: unless-stopped

volumes:
  index_data:
