<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexPorta</title>
  <meta name="description" content="NexPorta - A clean, lightweight, and secure personal dashboard for indexing and browsing local HTML files and documents.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    // Immediately apply saved theme to prevent flickering (rendering-hydration-no-flicker / js-cache-storage)
    (function() {
      try {
        var saved = localStorage.getItem('nexporta-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
      } catch (e) {}
    })();
  </script>
  <script src="version.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">

      <a class="wordmark" href="/">
        <img class="wordmark-icon" src="favicon.png" alt="NexPorta">
        NexPorta
        <span class="wordmark-version" id="app-version"></span>
      </a>

      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" class="search-input" placeholder="Search files…" aria-label="Search content" autocomplete="off" spellcheck="false">
        <button id="search-clear" class="search-clear-btn" aria-label="Clear search" title="Clear search" hidden>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <line x1="2.5" y1="2.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="9.5" y1="2.5" x2="2.5" y2="9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="header-actions">
        <button id="btn-new-folder" class="btn btn-secondary btn-header no-print" title="Create New Folder">
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M1 4h12v8H1V4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M1 4V3h4l1 1H1" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M7 6v4M5 8h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span class="btn-text-label">New Folder</span>
        </button>
        <button id="btn-upload" class="btn btn-primary btn-header no-print" title="Upload HTML File">
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M7 2v7M4 5l3-3 3 3M1 10v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="btn-text-label">Upload File</span>
        </button>

        <label class="sort-wrap" aria-label="Sort by">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <line x1="2" y1="3.5" x2="12" y2="3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="7" x2="9"  y2="7"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="10.5" x2="6" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <select id="sort" class="sort-select">
            <option value="title">Name</option>
            <option value="folder">Folder</option>
            <option value="modified">Recent</option>
          </select>
        </label>

        <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme" title="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="8" y1="1.5" x2="8" y2="3"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="8" y1="13"  x2="8" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1.5" y1="8" x2="3"   y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="13"  y1="8" x2="14.5" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3.4"  y1="3.4"  x2="4.5" y2="4.5"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11.5" y1="11.5" x2="12.6" y2="12.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3.4"  y1="12.6" x2="4.5"  y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11.5" y1="4.5"  x2="12.6" y2="3.4"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M13.5 10A6 6 0 1 1 6 2.5a4.5 4.5 0 0 0 7.5 7.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </div>
  </header>

  <main class="site-main">

    <div id="status" class="status" aria-live="polite">
      <span class="status-spinner"></span>
      Loading
    </div>
    <div id="groups" class="groups" hidden></div>
    <div id="empty" class="empty-state" hidden>
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <rect x="6" y="6" width="28" height="28" rx="4" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="20" x2="26" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="14" x2="20" y2="26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div id="empty-title" class="empty-title"></div>
      <div id="empty-subtitle" class="empty-subtitle"></div>
    </div>
  </main>

  <!-- Create Folder Modal -->
  <div id="modal-folder" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-folder-title" hidden>
    <div class="modal-backdrop" id="modal-folder-backdrop"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modal-folder-title" class="modal-title">Create New Folder</h2>
        <button class="modal-close" id="btn-close-folder-modal" aria-label="Close dialog">&times;</button>
      </div>
      <form id="form-folder" class="modal-form">
        <div class="form-group">
          <label for="input-folder-name" class="form-label">Folder Name</label>
          <input type="text" id="input-folder-name" class="form-input" placeholder="e.g. sales, engineering" required autocomplete="off">
          <span class="form-hint">Only alphanumeric characters and dashes are allowed. Single-level only.</span>
        </div>
        <div class="form-group">
          <label for="input-folder-password" class="form-label">Confirmation Password</label>
          <input type="password" id="input-folder-password" class="form-input" placeholder="Enter API password" required>
        </div>
        <div id="folder-error" class="modal-error-msg" hidden></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-text" id="btn-cancel-folder">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Upload File Modal -->
  <div id="modal-upload" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-upload-title" hidden>
    <div class="modal-backdrop" id="modal-upload-backdrop"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modal-upload-title" class="modal-title">Upload HTML File</h2>
        <button class="modal-close" id="btn-close-upload-modal" aria-label="Close dialog">&times;</button>
      </div>
      <form id="form-upload" class="modal-form">
        <div class="form-group">
          <label for="select-upload-folder" class="form-label">Destination Folder</label>
          <select id="select-upload-folder" class="form-select">
            <option value="">Root /</option>
          </select>
        </div>
        
        <div class="form-group">
          <span class="form-label">Select File</span>
          <div class="drag-drop-zone" id="drag-drop-zone">
            <svg class="upload-zone-icon" width="28" height="28" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 2v7M4 5l3-3 3 3M1 10v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p class="drag-drop-text">Drag & drop your HTML or Markdown file here or <span class="drag-drop-browse">browse</span></p>
            <input type="file" id="input-file" accept=".html,.htm,.md,.markdown" required style="display: none;">
          </div>
          <div class="selected-file-info" id="selected-file-info" hidden>
            <span class="selected-file-name" id="selected-file-name"></span>
            <button type="button" class="btn-remove-file" id="btn-remove-file" aria-label="Remove selected file">&times;</button>
          </div>
          <span class="form-hint">Only HTML (.html, .htm) and Markdown (.md, .markdown) files under 5MB are allowed.</span>
        </div>
        <div class="form-group">
          <label for="input-upload-password" class="form-label">Confirmation Password</label>
          <input type="password" id="input-upload-password" class="form-input" placeholder="Enter API password" required>
        </div>

        <div class="upload-progress-wrap" id="upload-progress-wrap" hidden>
          <div class="upload-progress-bar">
            <div class="upload-progress-fill" id="upload-progress-fill" style="width: 0%"></div>
          </div>
          <div class="upload-progress-text" id="upload-progress-text">0%</div>
        </div>

        <div id="upload-error" class="modal-error-msg" hidden></div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-text" id="btn-cancel-upload">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-submit-upload" disabled>Upload</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container no-print" aria-live="assertive"></div>

</body>
</html>
